# ============================================================
# NGINX SITE CONFIG — alerji-takvim
#
# Kurulum:
#   1) Bu dosyayı sunucuya yükle:
#        sudo cp alerji-takvim.conf /etc/nginx/sites-available/alerji-takvim
#   2) Sembolik link aç:
#        sudo ln -s /etc/nginx/sites-available/alerji-takvim /etc/nginx/sites-enabled/
#   3) Default site'ı kaldır (varsa):
#        sudo rm /etc/nginx/sites-enabled/default
#   4) Syntax test ve reload:
#        sudo nginx -t && sudo systemctl reload nginx
#
# DEĞİŞTİR:
#   • server_name              → domain'in (örn: alerji-takvim.com www.alerji-takvim.com)
#   • root path                → /var/www/alerji-takvim/frontend/dist  (build çıktısının yeri)
#   • proxy_pass port          → backend PM2 portu (default: 3001)
#
# HTTPS için certbot kullan: sudo certbot --nginx -d alerji-takvim.com
# Certbot bu dosyayı otomatik düzenler ve 443 server bloğu ekler.
# ============================================================

# ── Backend upstream (port değişirse tek yerden güncelle) ──
upstream alerji_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name alerji-takvim.com www.alerji-takvim.com;   # ← DEĞİŞTİR

    # ── Frontend root: Vite build çıktısı ──
    root /var/www/alerji-takvim/frontend/dist;             # ← DEĞİŞTİR
    index index.html;

    # ── Logs ──
    access_log /var/log/nginx/alerji-takvim.access.log;
    error_log  /var/log/nginx/alerji-takvim.error.log;

    # ── Güvenlik header'ları ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP frame'leri opsiyonel; Leaflet tile'ları için cartocdn.com lazım
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; connect-src 'self' https://*.basemaps.cartocdn.com;" always;

    # ── Gzip — JS/CSS/HTML için ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml+rss
        image/svg+xml;
    gzip_proxied any;
    gzip_comp_level 5;

    # ── Body size — chat history büyük olabilir ──
    client_max_body_size 1M;

    # ════════════════════════════════════════════════════════════
    # API REVERSE PROXY
    # /api/* isteklerini PM2'de çalışan Node.js'e yönlendir
    # ════════════════════════════════════════════════════════════
    location /api/ {
        proxy_pass http://alerji_backend;

        # Standart proxy header'ları
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # HTTP/1.1 + keepalive (upstream'e bağlantıyı yeniden kullan)
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # LLM yanıtları yavaş olabilir — timeout'ları cömert tut
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffering — Node.js streaming yapmıyor, default OK
        proxy_buffering on;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }

    # ════════════════════════════════════════════════════════════
    # STATİK ASSET'LER — uzun cache (file-name'de hash var)
    # Vite build, asset'leri /assets/index-XXXXX.js gibi hash'ler.
    # ════════════════════════════════════════════════════════════
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Diğer statik dosyalar (favicon, leaflet image'ları vs.)
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ════════════════════════════════════════════════════════════
    # SPA FALLBACK — React Router 404 sorunu çözümü
    # /favorites, /profile gibi client-side route'lar refresh'lendiğinde
    # Nginx file system'de bulamaz → index.html dön → React tarafı
    # route'u handle eder.
    # ════════════════════════════════════════════════════════════
    location / {
        # Önce dosya/dizin olarak dene → yoksa index.html'e düş
        try_files $uri $uri/ /index.html;

        # index.html'i CACHE'LEME — yeni deploy hemen görünsün
        # (Asset hash'lendiği için cache invalidation otomatik olur)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Hidden file engelleme (.env, .git vb. sızmasın) ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

